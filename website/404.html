<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>404 — Growth Club</title>

  <link rel="icon" href="/assets/images/logo-mark.svg">

  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/chrome.css">
  <link rel="stylesheet" href="/assets/css/pages.css">

  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.js"></script>
</head>
<body>

  <gc-header current=""></gc-header>

  <main>

    <section class="hero-sub" style="text-align: center; padding: 64px 0 120px;">
      <div class="wrap">
        <span class="kicker" style="justify-content: center;">/ Erro 404 · Página não encontrada</span>
        <div aria-hidden="true" style="font-family: var(--font-display); font-weight: 900; font-size: clamp(140px, 28vw, 320px); line-height: 0.88; letter-spacing: -0.06em; color: var(--accent-amber); margin: 24px 0 16px; font-feature-settings: 'tnum' 1;">404</div>
        <h1 style="font-family: var(--font-display); font-weight: 900; font-size: clamp(32px, 4.6vw, 56px); line-height: 1.1; letter-spacing: -0.035em; color: var(--fg-primary); max-width: 22ch; margin: 0 auto 20px;">Sem URL, <em style="color: var(--accent-amber); font-style: normal;">sem número.</em></h1>
        <p class="page-lede" style="margin-inline: auto; max-width: 52ch;">Sem número, não é Growth Club. Link envelheceu, URL inválida ou esse caminho nunca existiu. Tudo bem — o resto da comunidade continua no ar.</p>
        <div class="hero-ctas" style="margin-top: 40px; justify-content: center;">
          <a class="btn primary" href="/">Voltar pra home <i data-lucide="arrow-up-right"></i></a>
          <a class="btn ghost" href="/membro">Tornar-se membro</a>
        </div>
      </div>
    </section>

  </main>

  <gc-footer></gc-footer>

  <script src="/assets/js/header.js"></script>
  <script src="/assets/js/footer.js"></script>
  <script>
    if (window.lucide && typeof window.lucide.createIcons === 'function') {
      window.lucide.createIcons();
    }
  </script>
</body>
</html>
