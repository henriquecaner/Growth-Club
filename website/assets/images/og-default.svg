<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background — cream -->
  <rect width="1200" height="630" fill="#F5F1E8"/>

  <!-- Top-right ambient orb (decorative) -->
  <circle cx="1100" cy="100" r="240" fill="#D4A24C" opacity="0.12"/>
  <circle cx="120" cy="540" r="180" fill="#3E8B8B" opacity="0.08"/>

  <!-- Eyebrow -->
  <text x="80" y="120" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="600" fill="#0F1115" opacity="0.65" letter-spacing="2">/ COMUNIDADE DE GROWTH</text>

  <!-- Main headline -->
  <text x="80" y="260" font-family="Georgia, 'Times New Roman', serif" font-size="84" font-weight="900" fill="#0F1115" letter-spacing="-2">A <tspan fill="#C8351A">#1</tspan> Comunidade de Growth</text>
  <text x="80" y="360" font-family="Georgia, 'Times New Roman', serif" font-size="84" font-style="italic" font-weight="700" fill="#0F1115" letter-spacing="-2">Multidisciplinar do Brasil.</text>

  <!-- Subline -->
  <text x="80" y="450" font-family="Georgia, 'Times New Roman', serif" font-size="28" fill="#0F1115" opacity="0.75">Marketing · Vendas · CS · Analytics · Produto · Founders</text>

  <!-- Bottom row: stats + url -->
  <text x="80" y="560" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="700" fill="#0F1115">2.261 subs · 715 ativos · 10+ meetups · desde 2015</text>
  <text x="1120" y="560" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="700" fill="#0F1115" text-anchor="end" opacity="0.75">growthclub.pro</text>
